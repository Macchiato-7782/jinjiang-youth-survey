        function analyzePersonality() {
            const urlParams = new URLSearchParams(window.location.search);
            const data = {};

            // 从URL参数获取答案

                data[key] = value;
            }

            // 四维分析（结合新增问题提高准确性）
            // R/r: 浪漫/理性 (Romantic/Rational)
            const R_score = [
                ['是，人生必须结婚', '最好是，但不强求', '恋爱中，未婚'].includes(data.marriage_necessity),
                ['恋爱中，未婚', '已婚'].includes(data.relationship_status),
                data.partner_priority === '心动感觉',
                data.marriage_risk_view === '乐观'
            ].filter(Boolean).length;
            const R = R_score >= 2 ? 'R' : 'r';

            // F/f: 家庭/自由 (Family/Free)
            const F_score = [
                ['应该长期同住', '短期过渡可以'].includes(data.live_with_parents),
                ['家庭优先', '尽量兼顾'].includes(data.career_family),
                data.independence_need === '完全不需要',
                data.independence_need === '不太需要'
            ].filter(Boolean).length;
            const F = F_score >= 2 ? 'F' : 'f';

            // C/c: 生育/丁克 (Child/Childless)
            const C_score = [
                ['有明确意愿', '比较想要'].includes(data.fertility_willingness),
                ['两个', '三个及以上'].includes(data.children_num),
                data.three_child_policy === '非常支持',
                data.jinjiang_clan_impact === '影响很大'
            ].filter(Boolean).length;
            const C = C_score >= 2 ? 'C' : 'c';

            // M/m: 物质/理想 (Materialistic/Idealistic)
            const M_score = [
                ['经济压力', '收入水平', '住房成本'].some(factor => (data.factors || '').includes(factor)),
                ['压力很大', '有一定压力'].includes(data.marriage_customs),
                data.partner_priority === '条件匹配',
                data.marriage_risk_view === '谨慎'
            ].filter(Boolean).length;
            const M = M_score >= 2 ? 'M' : 'm';

            const code = R + F + C + M;

            // 获取人格数据
            const personality = personalityData[code] || personalityData['RFCM'];

            // 显示结果
            displayResult(code, personality);
        }

        // 显示结果
        function displayResult(code, personality) {
            // 动画显示代码
            const letters = code.split('');
            letters.forEach((letter, index) => {
                setTimeout(() => {
                    document.getElementById(`code${index + 1}`).textContent = letter;
                    document.getElementById(`code${index + 1}`).style.color = personality.color;
                }, index * 300);
            });

            // 生成几何画像
            generatePortrait(personality.portrait, personality.color, personality.secondaryColor);

            // 显示文字内容（带打字机效果）
            setTimeout(() => {
                document.getElementById('personalityName').textContent = personality.name;
                document.getElementById('personalityName').style.color = personality.color;
                document.getElementById('personalitySubtitle').textContent = personality.subtitle;

                typeWriter('personalityDesc', personality.desc);

                // 优势列表
                const advList = document.getElementById('advantageList');
                personality.advantages.forEach((adv, i) => {
                    setTimeout(() => {
                        const li = document.createElement('li');
                        li.textContent = adv;
                        li.style.opacity = '0';
                        advList.appendChild(li);
                        setTimeout(() => li.style.opacity = '1', 50);
                    }, 1500 + i * 200);
                });

                // 成长建议
                setTimeout(() => {
                    typeWriter('growthAdvice', personality.advice);
                }, 2500);

                // 最佳适配
                setTimeout(() => {
                    document.getElementById('matchCode').textContent = personality.match.code;
                    document.getElementById('matchName').textContent = personality.match.name;
                    document.getElementById('matchCard').style.borderColor = personality.color;
                }, 3500);
            }, 1500);
        }

        // 生成几何画像
        function generatePortrait(type, color, secondaryColor) {
            const container = document.getElementById('portrait');
            container.innerHTML = '';
            container.style.setProperty('--primary-color', color);
            container.style.setProperty('--secondary-color', secondaryColor);

            const portraitDiv = document.createElement('div');
            portraitDiv.className = `geometric-portrait portrait-${type}`;

            // 根据不同的类型创建不同的几何图形
            switch(type) {
                case 'upward-arrow':
                    portraitDiv.innerHTML = `
                        <div class="arrow-up"></div>
                        <div class="concentric-circles"></div>
                    `;
                    break;
                case 'cube':
                    portraitDiv.innerHTML = `
                        <div class="cube"></div>
                        <div class="shadow"></div>
                    `;
                    break;
                case 'shield':
                    portraitDiv.innerHTML = `
                        <div class="shield"></div>
                        <div class="cross"></div>
                    `;
                    break;
                case 'heart-wave':
                    portraitDiv.innerHTML = `
                        <div class="heart"></div>
                        <div class="wave"></div>
                    `;
                    break;
                case 'mask':
                    portraitDiv.innerHTML = `
                        <div class="mask"></div>
                        <div class="spotlight"></div>
                    `;
                    break;
                case 'single-figure':
                    portraitDiv.innerHTML = `
                        <div class="figure"></div>
                        <div class="aura"></div>
                    `;
                    break;
                case 'apron-baby':
                    portraitDiv.innerHTML = `
                        <div class="apron"></div>
                        <div class="baby"></div>
                    `;
                    break;
                case 'lying-figure':
                    portraitDiv.innerHTML = `
                        <div class="lying"></div>
                        <div class="zzz"></div>
                    `;
                    break;
                case 'calculator':
                    portraitDiv.innerHTML = `
                        <div class="calculator"></div>
                        <div class="chart"></div>
                    `;
                    break;
                case 'eye-circle':
                    portraitDiv.innerHTML = `
                        <div class="eye"></div>
                        <div class="circle-ring"></div>
                    `;
                    break;
                case 'rose-thorn':
                    portraitDiv.innerHTML = `
                        <div class="rose"></div>
                        <div class="thorn"></div>
                    `;
                    break;
                case 'gear-assembly':
                    portraitDiv.innerHTML = `
                        <div class="gear gear1"></div>
                        <div class="gear gear2"></div>
                    `;
                    break;
                case 'crown-heart':
                    portraitDiv.innerHTML = `
                        <div class="crown"></div>
                        <div class="heart-small"></div>
                    `;
                    break;
                case 'brain-heart':
                    portraitDiv.innerHTML = `
                        <div class="brain"></div>
                        <div class="heart-overlay"></div>
                    `;
                    break;
                case 'wolf-moon':
                    portraitDiv.innerHTML = `
                        <div class="wolf"></div>
                        <div class="moon"></div>
                    `;
                    break;
                case 'lightning-ring':
                    portraitDiv.innerHTML = `
                        <div class="lightning"></div>
                        <div class="ring"></div>
                    `;
                    break;
                default:
                    portraitDiv.innerHTML = `<div class="default-circle"></div>`;
            }

            container.appendChild(portraitDiv);
        }

        // 打字机效果
        function typeWriter(elementId, text) {
            const element = document.getElementById(elementId);
            element.textContent = '';
            let i = 0;
            const speed = 30;

            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        // 分享结果
        function shareResult() {
            const name = document.getElementById('personalityName').textContent;
            const subtitle = document.getElementById('personalitySubtitle').textContent;
            const text = `我的婚育人格是【${name}】\n${subtitle}\n\n快来测试你的婚育人格吧！`;

            if (navigator.share) {
                navigator.share({
                    title: '我的婚育人格',
                    text: text,
                    url: window.location.href
                });
            } else {
                // 复制到剪贴板
                navigator.clipboard.writeText(text).then(() => {
                    alert('结果已复制到剪贴板！');
                });
            }
        }

        // 页面加载后分析
        window.onload = analyzePersonality;
    </script>
</body>
</html>
